<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1200" viewBox="0 0 1920 1200" preserveAspectRatio="xMidYMid slice">
  <!-- Night falls on the city: the same skyline after the hero's sunset. -->
  <defs>
    <linearGradient id="nightSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#081a1c"/>
      <stop offset="0.55" stop-color="#11363b"/>
      <stop offset="0.85" stop-color="#1b4a4d"/>
      <stop offset="1" stop-color="#235257"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#dff0f0" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#dff0f0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cityGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3f8589" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3f8589" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1200" fill="url(#nightSky)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="140" cy="120" r="1.8" opacity="0.4"/><circle cx="320" cy="210" r="1.4" opacity="0.3"/>
    <circle cx="460" cy="90" r="2" opacity="0.45"/><circle cx="610" cy="260" r="1.3" opacity="0.25"/>
    <circle cx="730" cy="150" r="1.7" opacity="0.4"/><circle cx="880" cy="70" r="1.4" opacity="0.3"/>
    <circle cx="990" cy="300" r="1.8" opacity="0.35"/><circle cx="1120" cy="180" r="1.3" opacity="0.3"/>
    <circle cx="1260" cy="90" r="2" opacity="0.45"/><circle cx="1380" cy="250" r="1.5" opacity="0.3"/>
    <circle cx="1700" cy="320" r="1.7" opacity="0.35"/><circle cx="1820" cy="130" r="1.5" opacity="0.4"/>
    <circle cx="240" cy="380" r="1.5" opacity="0.3"/><circle cx="540" cy="420" r="1.3" opacity="0.25"/>
    <circle cx="820" cy="470" r="1.6" opacity="0.3"/><circle cx="1080" cy="420" r="1.3" opacity="0.25"/>
    <circle cx="1340" cy="480" r="1.5" opacity="0.3"/><circle cx="1600" cy="430" r="1.4" opacity="0.25"/>
    <circle cx="80" cy="520" r="1.4" opacity="0.25"/><circle cx="1880" cy="500" r="1.6" opacity="0.3"/>
    <circle cx="400" cy="560" r="1.3" opacity="0.2"/><circle cx="950" cy="560" r="1.4" opacity="0.22"/>
  </g>

  <!-- moon -->
  <circle cx="1560" cy="190" r="120" fill="url(#moonGlow)"/>
  <circle cx="1560" cy="190" r="36" fill="#dff0f0" opacity="0.92"/>
  <circle cx="1548" cy="180" r="7" fill="#b9d6d6" opacity="0.5"/>
  <circle cx="1572" cy="202" r="5" fill="#b9d6d6" opacity="0.45"/>

  <!-- glow of the city rising off the horizon -->
  <ellipse cx="960" cy="1060" rx="980" ry="340" fill="url(#cityGlow)"/>

  <!-- far skyline -->
  <path fill="#0d2b2e" opacity="0.85" d="M0,1080 L0,990 H110 V960 H180 V1000 H300 V940 H380 V1004 H520 V968 H600 V1010 H760 V950 H850 V996 H1000 V944 H1090 V1002 H1230 V966 H1330 V998 H1470 V940 H1560 V990 H1700 V958 H1800 V1000 H1920 V1080 Z"/>

  <!-- main skyline with CN Tower -->
  <g fill="#051315">
    <rect x="120" y="1010" width="78" height="190"/>
    <rect x="220" y="970" width="70" height="230"/>
    <rect x="310" y="1024" width="58" height="176"/>
    <!-- CN Tower -->
    <rect x="516" y="690" width="7" height="100"/>
    <rect x="496" y="788" width="48" height="34" rx="12"/>
    <rect x="503" y="822" width="34" height="12" rx="5"/>
    <path d="M506,834 L534,834 L545,1200 L495,1200 Z"/>
    <path d="M380,1200 a105,54 0 0 1 210,0 Z"/>
    <rect x="600" y="980" width="86" height="220"/>
    <rect x="700" y="1030" width="60" height="170"/>
    <rect x="900" y="1000" width="74" height="200"/>
    <rect x="1060" y="960" width="84" height="240"/>
    <rect x="1160" y="1026" width="56" height="174"/>
    <rect x="1340" y="990" width="78" height="210"/>
    <rect x="1500" y="1016" width="66" height="184"/>
    <rect x="1660" y="976" width="86" height="224"/>
    <rect x="1800" y="1030" width="74" height="170"/>
  </g>

  <!-- lit windows -->
  <g fill="#9fd4d6" opacity="0.4">
    <rect x="500" y="798" width="40" height="6" rx="3"/>
    <rect x="612" y="1000" width="8" height="11"/><rect x="628" y="1000" width="8" height="11"/><rect x="660" y="1000" width="8" height="11"/>
    <rect x="612" y="1026" width="8" height="11"/><rect x="644" y="1026" width="8" height="11"/>
    <rect x="628" y="1052" width="8" height="11"/><rect x="660" y="1052" width="8" height="11"/>
    <rect x="1072" y="980" width="8" height="11"/><rect x="1088" y="980" width="8" height="11"/><rect x="1120" y="980" width="8" height="11"/>
    <rect x="1072" y="1006" width="8" height="11"/><rect x="1104" y="1006" width="8" height="11"/>
    <rect x="1088" y="1032" width="8" height="11"/><rect x="1120" y="1032" width="8" height="11"/>
    <rect x="1352" y="1010" width="8" height="11"/><rect x="1384" y="1010" width="8" height="11"/>
    <rect x="1368" y="1036" width="8" height="11"/><rect x="1400" y="1036" width="8" height="11"/>
    <rect x="1672" y="996" width="8" height="11"/><rect x="1704" y="996" width="8" height="11"/><rect x="1720" y="996" width="8" height="11"/>
    <rect x="1672" y="1022" width="8" height="11"/><rect x="1704" y="1022" width="8" height="11"/>
    <rect x="232" y="990" width="8" height="11"/><rect x="264" y="990" width="8" height="11"/>
    <rect x="248" y="1016" width="8" height="11"/><rect x="232" y="1042" width="8" height="11"/>
    <rect x="912" y="1020" width="8" height="11"/><rect x="944" y="1020" width="8" height="11"/>
    <rect x="928" y="1046" width="8" height="11"/>
  </g>
</svg>
