<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1200" viewBox="0 0 1920 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="deep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b2123"/>
      <stop offset="0.55" stop-color="#17373a"/>
      <stop offset="1" stop-color="#1e4347"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="110"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.07" intercept="0"/>
      </feComponentTransfer>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1920" height="1200" fill="url(#deep)"/>

  <g filter="url(#soft)">
    <ellipse cx="1560" cy="180" rx="640" ry="340" fill="#3f8589" opacity="0.5"/>
    <ellipse cx="280" cy="940" rx="700" ry="400" fill="#276266" opacity="0.65"/>
    <ellipse cx="1080" cy="1120" rx="760" ry="320" fill="#5fa3a7" opacity="0.3"/>
    <ellipse cx="420" cy="120" rx="460" ry="260" fill="#235257" opacity="0.8"/>
    <path d="M-100,560 C460,420 900,660 1400,500 C1700,410 1900,500 2020,440 L2020,720 C1500,830 900,640 400,760 C200,810 0,760 -100,790 Z" fill="#92c3c5" opacity="0.16"/>
  </g>

  <rect width="1920" height="1200" filter="url(#grain)" opacity="0.9"/>
</svg>
