<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1400" viewBox="0 0 1920 1400" preserveAspectRatio="xMidYMid slice">
  <!-- Original abstract direction: soft teal gradient field on a pale sky. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#f1f7f7"/>
      <stop offset="1" stop-color="#ddedee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobPine" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#276266" stop-opacity="0.6"/>
      <stop offset="0.55" stop-color="#276266" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#276266" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobTeal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3f8589" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#3f8589" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#3f8589" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobLight" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5fa3a7" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#5fa3a7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobDeep" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#235257" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#235257" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06" intercept="0"/>
      </feComponentTransfer>
      <feComposite operator="in" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1920" height="1400" fill="url(#sky)"/>

  <!-- soft gradient field -->
  <ellipse cx="320" cy="1180" rx="1050" ry="600" fill="url(#blobPine)"/>
  <ellipse cx="1640" cy="1240" rx="1100" ry="640" fill="url(#blobTeal)"/>
  <ellipse cx="980" cy="1400" rx="1150" ry="520" fill="url(#blobLight)"/>
  <ellipse cx="1700" cy="220" rx="640" ry="380" fill="url(#blobLight)"/>
  <ellipse cx="160" cy="180" rx="560" ry="340" fill="url(#blobDeep)"/>

  <!-- bright centre so the headline floats on light -->
  <ellipse cx="960" cy="620" rx="900" ry="520" fill="url(#glow)"/>

  <rect width="1920" height="1400" filter="url(#grain)" opacity="0.9"/>
</svg>
