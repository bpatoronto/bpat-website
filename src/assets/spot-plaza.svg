<svg xmlns="http://www.w3.org/2000/svg" width="360" height="200" viewBox="0 0 360 200" preserveAspectRatio="xMidYMid slice">
  <!-- Placeholder: suburban plaza, lots of asphalt, no racks. -->
  <defs>
    <linearGradient id="psky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a5a6d"/>
      <stop offset="0.6" stop-color="#e8956a"/>
      <stop offset="1" stop-color="#f8c07e"/>
    </linearGradient>
    <linearGradient id="plot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a4a4c"/>
      <stop offset="1" stop-color="#13292b"/>
    </linearGradient>
  </defs>
  <rect width="360" height="110" fill="url(#psky)"/>
  <circle cx="285" cy="92" r="26" fill="#fff3d6" opacity="0.7"/>
  <!-- strip mall -->
  <rect x="22" y="52" width="200" height="58" fill="#3a2b44"/>
  <rect x="22" y="44" width="200" height="12" fill="#4b3a55"/>
  <g fill="#ffd9a3" opacity="0.8">
    <rect x="34" y="66" width="30" height="32"/>
    <rect x="74" y="66" width="30" height="32"/>
    <rect x="114" y="66" width="30" height="32"/>
    <rect x="154" y="66" width="30" height="32"/>
    <rect x="194" y="66" width="18" height="32"/>
  </g>
  <!-- parking lot -->
  <rect y="110" width="360" height="90" fill="url(#plot)"/>
  <g stroke="#e8d8c0" stroke-width="3" opacity="0.5">
    <path d="M30,200 L58,124"/>
    <path d="M90,200 L118,124"/>
    <path d="M150,200 L178,124"/>
    <path d="M210,200 L238,124"/>
    <path d="M270,200 L298,124"/>
    <path d="M330,200 L358,124"/>
  </g>
  <!-- one lonely car -->
  <g fill="#0a2022">
    <rect x="244" y="138" width="52" height="18" rx="7"/>
    <path d="M252,140 q12,-12 36,0 Z"/>
    <circle cx="256" cy="156" r="6"/>
    <circle cx="284" cy="156" r="6"/>
  </g>
