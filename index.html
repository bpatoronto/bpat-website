<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon_2.jpeg" />

    <title>Bike Parking Alliance of Toronto — Secure bike parking for every ride</title>
    <meta
      name="description"
      content="The Bike Parking Alliance of Toronto is fighting for secure, abundant bike parking across the city. Every ride ends at a rack — let's make sure there is one."
    />
    <link rel="canonical" href="https://bpat.ca/" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#276266" />
    <meta name="author" content="Bike Parking Alliance of Toronto" />
    <meta name="keywords" content="bike parking, Toronto, cycling, bike racks, secure bicycle parking, active transportation, bike advocacy" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bike Parking Alliance of Toronto" />
    <meta property="og:title" content="Bike Parking Alliance of Toronto — Secure bike parking for every ride" />
    <meta
      property="og:description"
      content="Toronto doesn't have nearly enough places to park a bike. We're fixing that, one rack at a time."
    />
    <meta property="og:url" content="https://bpat.ca/" />
    <meta property="og:image" content="https://bpat.ca/bike-bg.jpeg" />
    <meta property="og:image:alt" content="Cyclists and bikes parked along a Toronto street" />
    <meta property="og:locale" content="en_CA" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bike Parking Alliance of Toronto" />
    <meta
      name="twitter:description"
      content="Toronto doesn't have nearly enough places to park a bike. We're fixing that, one rack at a time."
    />
    <meta name="twitter:image" content="https://bpat.ca/bike-bg.jpeg" />

    <!-- Fonts: preconnect + only the weights actually used (300/400/500/600/700) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Preload the LCP hero image -->
    <link
      rel="preload"
      as="image"
      href="/bike-bg.webp"
      type="image/webp"
      fetchpriority="high"
    />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Bike Parking Alliance of Toronto",
        "alternateName": "BPAT",
        "url": "https://bpat.ca/",
        "logo": "https://bpat.ca/favicon_2.jpeg",
        "description": "The Bike Parking Alliance of Toronto is fighting for secure, abundant bike parking across the city.",
        "areaServed": {
          "@type": "City",
          "name": "Toronto"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
